name: Update casting prices

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 00:00 UTC（=09:00 JST）
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: 'メール通知テスト用：価格取得を強制的に失敗させる（通常はfalse）'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

# Pagesデプロイと同じグループで直列化（公開中のデプロイを中断しない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      # 取得→コミット→push を1ステップで実行する。
      # push は他の更新と競合して non-fast-forward で弾かれることがあるため、
      # 「最新mainへ同期 → 価格を再生成 → push」をリトライする（履歴は常に最新へ
      # 追記されるので衝突しない）。失敗してもデプロイは続けたいので continue-on-error。
      - name: Update prices
        id: update
        continue-on-error: true
        run: |
          if [ "${{ inputs.simulate_failure }}" = "true" ]; then
            echo "::warning::simulate_failure=true：通知テストのため強制的に失敗させます"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            if ! ruby scripts/update_prices.rb; then
              echo "::warning::価格取得に失敗しました（前回値で更新済み）"
              exit 1
            fi
            if git diff --quiet -- yuai2026/prices.json yuai2026/prices-history.json; then
              echo "価格に変更なし"
              exit 0
            fi
            git add yuai2026/prices.json yuai2026/prices-history.json
            git commit --quiet -m "Update silver prices (casting/market)"
            if git push; then
              echo "pushed (attempt ${attempt})"
              exit 0
            fi
            echo "push rejected, retrying (${attempt}/5)…"
            sleep $((attempt * 3))
          done
          echo "::error::push が5回失敗しました"
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # 更新が失敗していたらジョブを失敗にする（GitHubが失敗メールを送る）。
      # デプロイは上で完了済みなので、サイト自体は最新（or前回）値で更新される。
      - name: Fail the run if update failed
        if: steps.update.outcome == 'failure'
        run: |
          echo "::error::銀地金価格の更新に失敗しました（取得 or push）。ログを確認してください。"
          exit 1
