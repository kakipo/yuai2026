name: Update casting prices

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 00:00 UTC（=09:00 JST）
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Pagesデプロイと同じグループで直列化（公開中のデプロイを中断しない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Fetch latest prices
        run: ruby scripts/update_prices.rb

      - name: Commit prices.json if changed
        run: |
          if git diff --quiet -- yuai2026/prices.json; then
            echo "価格に変更なし"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add yuai2026/prices.json
            git commit -m "Update casting prices from Seaforce"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
